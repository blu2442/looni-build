# ── looni-neutron DXVK configuration ──────────────────────────────────────────
# Shipped with Neutron builds. Place in the game directory or override with
# DXVK_CONFIG_FILE=/path/to/dxvk.conf
#
# Full reference: https://github.com/doitsujin/dxvk/blob/master/dxvk.conf

# Enable async shader compilation — eliminates shader stutter in most games.
# Shaders compile in background threads; first frame uses a placeholder.
dxvk.enableAsync = True

# State cache: dramatically reduces shader compilation on subsequent launches.
# The cache file is stored per-game in the Wine prefix.
dxvk.enableStateCache = True

# HUD: disabled by default. Set DXVK_HUD=fps or DXVK_HUD=full at runtime.
# dxvk.hud =

# Frame queue size — number of frames the CPU can prepare ahead of the GPU.
# 0 = DXVK default (usually 3). Lower = less input lag, higher = smoother.
# dxvk.numBackBuffers = 0

# Max frame latency for D3D9 games (0 = use app's setting)
# d3d9.maxFrameLatency = 0

# Memory allocation: let DXVK manage GPU memory rather than the app
# dxvk.useRawSsbo = True

# D3D11 feature level for games that only need a specific level
# d3d11.maxFeatureLevel = 12_1

# Shader model for D3D9 games — raise if game requests SM3+
# d3d9.shaderModel = 3
