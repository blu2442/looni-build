# ── looni-neutron VKD3D-Proton configuration ──────────────────────────────────
# Environment variables for VKD3D-Proton. Set these in the neutron launcher
# or export them before running a game.
#
# These are not read from a file by default — the neutron launcher applies them.
# Full reference: https://github.com/HansKristian-Work/vkd3d-proton

# Shader cache: persistent pipeline cache for faster subsequent launches
# VKD3D_CONFIG=dxr,dxr11    # Enable DXR (raytracing) if GPU supports it
# VKD3D_FEATURE_LEVEL=12_2  # Override reported feature level

# Debug/perf (uncomment as needed):
# VKD3D_DEBUG=none           # none/err/warn/trace
# VKD3D_SHADER_DEBUG=none
