# neutron-customization.cfg
# ─────────────────────────────────────────────────────────────────────────────
# Sourced by neutron-builder.sh (before it calls neutron-build-core.sh) and by
# neutron-build-core.sh itself (Bash cannot export arrays across processes).
#
# neutron-builder.sh always overrides WINE_SOURCE, PREFIX, WINE_BUILD, JOBS,
# SKIP_32BIT, and BUILD_RUN_DIR with its computed values, so those settings
# here only matter when neutron-build-core.sh is invoked standalone.
#
# To customise for a specific machine, copy this file and pass the copy with:
#   ./neutron-builder.sh --cfg /path/to/my-neutron.cfg
# ─────────────────────────────────────────────────────────────────────────────

# ── Standalone paths (overridden at runtime by neutron-builder.sh) ──────────
export WINE_SOURCE="${WINE_SOURCE:-${HOME}/wine-builds/src/proton-wine}"
export PREFIX="${PREFIX:-${HOME}/wine-builds/install/looni-neutron}"
export WINE_BUILD="${WINE_BUILD:-looni_proton}"

# ── Compiler definitions ─────────────────────────────────────────────────────
# Native compilers for the Unix (.so) side of the build
export CC_64="${CC_64:-x86_64-linux-gnu-gcc}"
export CXX_64="${CXX_64:-x86_64-linux-gnu-g++}"
export CC_32="${CC_32:-i686-linux-gnu-gcc}"
export CXX_32="${CXX_32:-i686-linux-gnu-g++}"

# MinGW PE cross-compilers for the Windows (.dll) side of the build.
# --with-mingw tells Wine's configure to use these to build PE modules.
# This is REQUIRED for Proton — it enables the PE/ELF thunking that
# makes Steam's FPS overlay, Steam Input, and other Steam features work.
export MINGW_CC_64="${MINGW_CC_64:-x86_64-w64-mingw32-gcc}"
export MINGW_CXX_64="${MINGW_CXX_64:-x86_64-w64-mingw32-g++}"
export MINGW_CC_32="${MINGW_CC_32:-i686-w64-mingw32-gcc}"
export MINGW_CXX_32="${MINGW_CXX_32:-i686-w64-mingw32-g++}"

# ── Parallelism ───────────────────────────────────────────────────────────────
# Defaults to all logical CPUs. Leave a couple free for other work if needed:
#   export JOBS=$(( $(nproc) - 2 ))
export JOBS="${JOBS:-$(nproc)}"

# ── Configure flags ───────────────────────────────────────────────────────────
# _configure_args   — applied to BOTH 32-bit and 64-bit configure runs
# _configure_args32 — applied to the 32-bit configure only
# _configure_args64 — applied to the 64-bit configure only
#
# These MUST be Bash arrays; neutron-build-core.sh re-sources this file to
# expand them at configure time.

export _configure_args=(
    # ── Proton-mandatory flags ─────────────────────────────────────────────
    # Build Wine PE modules (Windows DLLs) using the MinGW cross-compiler.
    # Without this, PE modules are compiled as ELF shared objects (Winelib
    # format), which breaks Steam overlay, Steam Input, and many DRM checks.
    # This is the single most important difference between a Proton Wine build
    # and a regular Wine build.
    "--with-mingw"

    # GStreamer media backend — required for video playback in games
    "--with-gstreamer"

    # DBus — needed by Proton's session management and some game launchers
    "--with-dbus"

    # NOTE: --with-ntsync is NOT a valid configure flag in Valve's proton-wine
    # fork — ntsync is detected automatically when linux/ntsync.h is present in
    # the build environment.  The Containerfile fetches that header from the
    # kernel source so ntsync compiles in without any flag here.

    # ── Graphics / display backends ────────────────────────────────────────
    "--with-wayland"
    "--with-xrender"
    "--with-xcomposite"
    "--with-xrandr"
    "--with-xinerama"
    "--with-xcursor"
    "--with-xfixes"
    "--enable-winevulkan"

    # ── Disabled features ──────────────────────────────────────────────────
    # OSS: outdated audio system; Proton uses ALSA/PulseAudio/PipeWire
    "--without-oss"

    # ── Optional: disable ffmpeg to reduce dependency surface.
    # Re-enable if you need Wine's built-in video codec support:
    #   remove the line below and add "--with-ffmpeg"
    "--without-ffmpeg"

    # SDL is kept enabled — Valve's Wine fork has its own input stack
    # but SDL is still needed for some controller support paths.
    # (neutron-build-core.sh adds --without-sdl for the experimental source
    #  only, where Valve's SDL handling conflicts with the configure path.)

    # Speed up builds by skipping test binaries
    "--disable-tests"
)

# 32-bit only configure flags
export _configure_args32=(
    # GStreamer i386 dev packages cannot be co-installed alongside their x86_64
    # counterparts on Ubuntu 24.04 (hard Conflicts: in the package metadata).
    # The 64-bit Wine handles all media/GStreamer paths; the 32-bit half doesn't
    # need it and configure will fail if we leave --with-gstreamer inherited
    # from _configure_args without this override.
    "--without-gstreamer"
)

# 64-bit only configure flags
export _configure_args64=(
    # Nothing Proton-specific needed here.
)

# ── Compiler flags ─────────────────────────────────────────────────────────
# Applied to the host (native) compilation side.
# /usr/include is explicitly added so configure's header tests can find
# kernel headers like linux/ntsync.h which live there, not in the
# multiarch /usr/include/x86_64-linux-gnu path that configure uses by default.
export CPPFLAGS="${CPPFLAGS:-} -I/usr/include -I/usr/include/x86_64-linux-gnu"
export CROSSCPPFLAGS="${CROSSCPPFLAGS:-} -I/usr/include/i386-linux-gnu"
export LDFLAGS="${LDFLAGS:-} -L/usr/lib/x86_64-linux-gnu -L/lib/x86_64-linux-gnu"

# ── OpenCL ──────────────────────────────────────────────────────────────────
# neutron-build-core.sh auto-detects libOpenCL.so via ldconfig and sets this.
# Force it here if auto-detection misses it on your system:
# export OPENCL_LIBS="-lOpenCL"

# ── pkg-config cross-compilation ─────────────────────────────────────────────
export PKG_CONFIG_ALLOW_CROSS=1
