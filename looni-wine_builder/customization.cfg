# customization.cfg
# ─────────────────────────────────────────────────────────────────────────
# Sourced by wine-builder.sh (before it calls wine-build-core.sh) and by
# wine-build-core.sh (for the configure arg arrays, which Bash cannot
# export across process boundaries).
#
# wine-builder.sh always overrides WINE_SOURCE, PREFIX, WINE_BUILD, JOBS,
# SKIP_32BIT, and BUILD_RUN_DIR with its own computed values, so those
# settings here only matter when wine-build-core.sh is invoked standalone.
#
# To customise for a specific machine, copy this file and pass the copy
# with:  ./wine-builder.sh --cfg /path/to/my.cfg
# ─────────────────────────────────────────────────────────────────────────

# ── Standalone paths (overridden at runtime by wine-builder.sh) ──────────
# WINE_SOURCE: only used when wine-build-core.sh is called directly.
export WINE_SOURCE="${WINE_SOURCE:-${HOME}/wine-builds/src/wine-custom}"

# PREFIX: install destination.  wine-builder.sh sets this to
#   ~/wine-builds/install/<build-name>  by default.
export PREFIX="${PREFIX:-${HOME}/wine-builds/install/wine-custom}"

# WINE_BUILD: internal identifier (underscores OK).
export WINE_BUILD="${WINE_BUILD:-wine_custom}"

# ── Compiler definitions ─────────────────────────────────────────────────
# Used by build-32.sh / build-64.sh when they are sourced from a TKG-style
# wrapper.  wine-build-core.sh constructs its own CC/CXX directly.
export CC_64="${CC_64:-x86_64-linux-gnu-gcc}"
export CXX_64="${CXX_64:-x86_64-linux-gnu-g++}"
export CC_32="${CC_32:-i686-linux-gnu-gcc}"
export CXX_32="${CXX_32:-i686-linux-gnu-g++}"

# MinGW PE cross-compilers (for the Windows DLL side of the build)
export MINGW_CC_64="${MINGW_CC_64:-x86_64-w64-mingw32-gcc}"
export MINGW_CXX_64="${MINGW_CXX_64:-x86_64-w64-mingw32-g++}"
export MINGW_CC_32="${MINGW_CC_32:-i686-w64-mingw32-gcc}"
export MINGW_CXX_32="${MINGW_CXX_32:-i686-w64-mingw32-g++}"

# ── Parallelism ───────────────────────────────────────────────────────────
# Number of parallel make threads.  Defaults to all logical CPUs.
# Override here to leave headroom for other work, e.g.:
#   export JOBS=$(( $(nproc) - 2 ))
export JOBS="${JOBS:-$(nproc)}"
export JOBS_EXPORT="${JOBS}"

# ── Configure flags ───────────────────────────────────────────────────────
# _configure_args   — applied to BOTH 32-bit and 64-bit configure runs
# _configure_args32 — applied to the 32-bit configure only
# _configure_args64 — applied to the 64-bit configure only
#
# These must be Bash arrays; wine-build-core.sh re-sources this file to
# expand them.

export _configure_args=(
    # ── Graphics / display backends ──────────────────────────────────
    # Wayland  (primary on KDE/GNOME Wayland sessions)
    "--with-wayland"
    # X11 / XWayland fallback
    "--with-xrender"
    "--with-xcomposite"
    "--with-xrandr"
    "--with-xinerama"
    "--with-xcursor"
    "--with-xfixes"
    # Vulkan
    "--enable-winevulkan"

    # ── Optional features ─────────────────────────────────────────────
    # Disable ffmpeg integration (reduces dependency surface; re-enable if
    # you need Wine's built-in video/audio codec support):
    "--without-ffmpeg"
    # SDL is enabled (no --without-sdl) so that winebus.sys can enumerate
    # controllers via SDL2 — required for gamepad support in games like GTA IV.
    # If you want to disable it: add "--without-sdl" here.

    # Speed up clean builds by not compiling test binaries
    "--disable-tests"
)

# 32-bit only  (extend as needed)
export _configure_args32=()

# 64-bit only  (extend as needed)
export _configure_args64=()

# ── Compiler flags ────────────────────────────────────────────────────────
# These apply to the host (native) compilation side.
# The 32-bit cross-compile has its own CFLAGS set in wine-build-core.sh.
export CPPFLAGS="${CPPFLAGS:-} -I/usr/include/x86_64-linux-gnu"
export CROSSCPPFLAGS="${CROSSCPPFLAGS:-} -I/usr/include/i386-linux-gnu"
export LDFLAGS="${LDFLAGS:-} -L/usr/lib/x86_64-linux-gnu -L/lib/x86_64-linux-gnu"

# ── OpenCL ────────────────────────────────────────────────────────────────
# wine-build-core.sh auto-detects libOpenCL.so via ldconfig and sets this.
# You can force it here too:
# export OPENCL_LIBS="-lOpenCL"

# ── pkg-config cross-compilation ─────────────────────────────────────────
export PKG_CONFIG_ALLOW_CROSS=1
